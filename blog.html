<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORTOISE // notes from the slow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #060606;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            color: #f0f0f0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none;
            z-index: 100;
        }

        .mac-bar {
            width: 100%;
            background: #111;
            border-bottom: 1px solid #1e1e1e;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        .mac-title { flex: 1; text-align: center; font-size: 0.75rem; color: #555; letter-spacing: 2px; }

        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            min-height: calc(100vh - 41px);
        }

        .sidebar {
            background: #0a0a0a;
            border-right: 1px solid #1a1a1a;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: sticky;
            top: 41px;
            height: calc(100vh - 41px);
            overflow-y: auto;
        }

        .sidebar-logo { font-family: 'VT323', monospace; font-size: 2rem; letter-spacing: 4px; color: #7fff00; margin-bottom: 20px; text-shadow: 1px 1px 0 #4a9900; }
        .sidebar-label { font-size: 0.6rem; color: #333; letter-spacing: 3px; margin: 16px 0 8px; }

        .nav-item {
            padding: 8px 12px;
            font-size: 0.78rem;
            color: #555;
            letter-spacing: 1px;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all 0.15s;
            text-decoration: none;
            display: block;
        }

        .nav-item:hover { color: #aaa; border-left-color: #2a2a2a; }
        .nav-item.active { color: #7fff00; border-left-color: #7fff00; background: rgba(127,255,0,0.04); }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            padding: 10px 12px;
            border: 1px solid #1a1a1a;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 1px;
        }

        .blink { width: 6px; height: 6px; background: #7fff00; animation: blink 1.2s step-end infinite; }

        .main { background: #060606; overflow-y: auto; }

        .topbar {
            padding: 14px 40px;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #060606;
            z-index: 50;
        }

        .topbar-left { font-size: 0.7rem; color: #333; letter-spacing: 2px; }
        .topbar-right { font-size: 0.7rem; color: #333; letter-spacing: 2px; }

        .content { padding: 60px 80px 80px; max-width: 860px; }

        .page-header { margin-bottom: 50px; }
        .tortoise-icon { font-size: 56px; display: block; margin-bottom: 16px; animation: slowPulse 5s ease-in-out infinite; cursor: pointer; }

        @keyframes slowPulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .page-title { font-family: 'VT323', monospace; font-size: 5rem; letter-spacing: 8px; color: #f0f0f0; text-shadow: 2px 2px 0 #4a9900; line-height: 1; }
        .page-sub { font-size: 0.75rem; color: #444; letter-spacing: 3px; margin-top: 8px; }

        .post {
            margin-bottom: 60px;
            position: relative;
            padding-left: 24px;
            border-left: 2px solid #1a1a1a;
            transition: border-color 0.2s;
        }

        .post:hover { border-left-color: #7fff00; }

        .post::before {
            content: "🐢";
            position: absolute;
            left: -14px; top: 0;
            font-size: 0.85rem;
            background: #060606;
            padding: 0 4px;
        }

        .post-meta { font-size: 0.6rem; color: #7fff00; letter-spacing: 3px; margin-bottom: 8px; }

        .post-title {
            font-family: 'VT323', monospace;
            font-size: 2.5rem;
            letter-spacing: 3px;
            color: #f0f0f0;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .post-body { color: #888; font-size: 0.88rem; line-height: 1.95; }
        .post-body p { margin-bottom: 14px; }

        .separator { text-align: center; color: #1a1a1a; margin: 10px 0 50px; font-size: 0.65rem; letter-spacing: 6px; }

        .footer-bar {
            border-top: 1px solid #111;
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: #222;
            letter-spacing: 2px;
            margin-top: 60px;
        }

        .cursor { display: inline-block; width: 7px; height: 13px; background: #f0f0f0; animation: blink 1s step-end infinite; vertical-align: middle; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .content { padding: 30px 20px 60px; }
            .page-title { font-size: 3rem; }
            .topbar { padding: 14px 20px; }
            .footer-bar { flex-direction: column; gap: 6px; }
        }
    </style>
</head>
<body>

<div class="mac-bar">
    <span class="dot dot-red"></span>
    <span class="dot dot-yellow"></span>
    <span class="dot dot-green"></span>
    <span class="mac-title">TORTOISE — notes from the slow</span>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-logo">🐢 TRT</div>
        <div class="sidebar-label">NAVIGATION</div>
        <a href="/" class="nav-item">◈ &nbsp;home</a>
        <a href="/blog.html" class="nav-item active">◈ &nbsp;blog</a>
        <a href="/about.html" class="nav-item">◈ &nbsp;about</a>
        <div class="sidebar-label">STATUS</div>
        <div class="nav-item">🍒 &nbsp;coming soon</div>
        <div class="nav-item">⬡ &nbsp;building in dark</div>
        <div class="status-pill">
            <span class="blink"></span>
            SIGNAL ACTIVE
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-left"><span style="color:#7fff00">●</span> &nbsp;NOTES.LOG &nbsp;//&nbsp; TORTOISE v0.1</span>
            <span class="topbar-right">BANGKOK // 2025 &nbsp;<span class="cursor"></span></span>
        </div>

        <div class="content">

            <div class="page-header">
                <span class="tortoise-icon" id="tortoise-icon">🐢</span>
                <div class="page-title">TORTOISE NOTES</div>
                <div class="page-sub">>> slow thoughts. posted when they're ready.</div>
            </div>

            <div id="blog-posts">
                <div style="text-align:center; color:#333; padding:40px; letter-spacing:3px;">[ loading... ]</div>
            </div>

            <div class="footer-bar">
                <span>TORTOISE // notes from the slow</span>
                <span>NOTES.LOG &nbsp;<span class="cursor"></span></span>
            </div>

        </div>
    </div>
</div>

<script>
    const posts = [
        {
            date: "sep 22, 2025",
            title: "why slow matters",
            content: `the world moves fast. we don't have to.\n\nwhen you feel unheard, when you feel lonely, when you feel invisible — the last thing you need is something fast. fast feels cold. fast feels like you're just another notification.\n\nslow feels different. slow feels like someone is actually paying attention. like they're not in a hurry to leave.\n\nthat's why this is tortoise. because we're building something that stays. something that doesn't rush you. something that waits until you're ready.\n\nif you're reading this, thank you for being slow with me.\n\n🐢\nslowly,\ndeva`
        },
        {
            date: "may 5, 2024",
            title: "what i'm building and why",
            content: `someone asked me today: "why an app for loneliness? isn't that what friends are for?"\n\nyes. and no.\n\nfriends are wonderful. but friends aren't always there at 3am. friends don't always understand the kind of quiet that feels like drowning. and sometimes, telling a friend "i'm not okay" feels harder than sitting alone.\n\ntortoise is for those moments. not to replace friends. but to be there when friends can't be.\n\na human who just listens. no advice. no fixing. just "i hear you. i'm here."\n\nthat's all. that's everything.`
        },
        {
            date: "feb 20, 2024",
            title: "the cherry story",
            content: `why a cherry?\n\npeople ask. they see the pixel cherry next to the tortoise and wonder.\n\ncherries are small. they're sweet. they don't try to be a whole meal. they're just a moment.\n\nwhen you're lonely, you don't need someone to fix everything. sometimes you just need a small sweetness. someone to sit with you. someone to say "i see you."\n\nthe cherry is that small sweetness.\n\n🍒\nsweetly,\ndeva`
        }
    ];

    const container = document.getElementById('blog-posts');
    container.innerHTML = posts.map((post, i) => {
        const paras = post.content.split('\n\n').map(p => p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : '').join('');
        return `
            <div class="post">
                <div class="post-meta">>> ${post.date.toUpperCase()}</div>
                <div class="post-title">${post.title}</div>
                <div class="post-body">${paras}</div>
            </div>
            ${i < posts.length - 1 ? '<div class="separator">— // —</div>' : ''}
        `;
    }).join('');

    document.getElementById('tortoise-icon').addEventListener('click', function() {
        this.style.transform = 'scale(1.3)';
        setTimeout(() => this.style.transform = '', 300);
        alert('🐢 "keep writing. someone is reading."');
    });
</script>
</body>
</html>
