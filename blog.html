<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORTOISE // notes from the slow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        :root {
            --black: #060606; --panel: #0d0d0d; --border: #1e1e1e;
            --green: #7fff00; --green-dim: #4a9900;
            --white: #f0f0f0; --dim: #555; --dimmer: #2a2a2a; --cherry: #ff3c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--black); font-family: 'Share Tech Mono', 'Courier New', monospace; color: var(--white); line-height: 1.8; min-height: 100vh; padding: 20px; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); pointer-events: none; z-index: 1000; }

        .container { max-width: 680px; margin: 0 auto; border: 1px solid var(--border); padding: 50px 40px; background: var(--panel); box-shadow: 6px 6px 0 var(--dimmer), 12px 12px 0 #111; position: relative; }
        .px { position: absolute; width: 8px; height: 8px; background: var(--green); opacity: 0.5; }
        .px-tl { top: -1px; left: -1px; } .px-tr { top: -1px; right: -1px; } .px-bl { bottom: -1px; left: -1px; } .px-br { bottom: -1px; right: -1px; }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--dim); letter-spacing: 2px; padding-bottom: 12px; border-bottom: 1px solid var(--dimmer); margin-bottom: 40px; }
        .status-dot { display: inline-block; width: 6px; height: 6px; background: var(--green); animation: blink 1.2s step-end infinite; margin-right: 6px; }

        .nav { display: flex; gap: 25px; justify-content: center; margin-bottom: 50px; }
        .nav a { color: var(--dim); text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; border-bottom: 1px solid transparent; padding-bottom: 2px; transition: all 0.15s; }
        .nav a:hover, .nav a.active { color: var(--green); border-bottom-color: var(--green); }

        .page-header { text-align: center; margin-bottom: 50px; }
        .tortoise-icon { font-size: 60px; display: block; margin-bottom: 12px; animation: slowPulse 5s ease-in-out infinite; }
        @keyframes slowPulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .page-title { font-family: 'VT323', monospace; font-size: 3.5rem; letter-spacing: 6px; text-shadow: 2px 2px 0 var(--green-dim); }
        .page-sub { font-size: 0.75rem; color: var(--dim); letter-spacing: 3px; margin-top: 6px; }

        .post { margin-bottom: 60px; position: relative; padding-left: 24px; border-left: 2px solid var(--dimmer); transition: border-color 0.2s; }
        .post:hover { border-left-color: var(--green); }
        .post::before { content: "🐢"; position: absolute; left: -14px; top: 0; font-size: 0.85rem; background: var(--panel); padding: 0 4px; }
        .post-meta { font-size: 0.65rem; color: var(--green); letter-spacing: 3px; margin-bottom: 8px; }
        .post-title { font-family: 'VT323', monospace; font-size: 2.2rem; letter-spacing: 3px; color: var(--white); margin-bottom: 16px; line-height: 1.2; }
        .post-body { color: #999; font-size: 0.9rem; line-height: 1.9; }
        .post-body p { margin-bottom: 14px; }

        .separator { text-align: center; color: var(--dimmer); margin: 20px 0 50px; font-size: 0.65rem; letter-spacing: 6px; }

        .back-link { display: inline-block; margin-top: 20px; color: var(--dim); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; border-bottom: 1px dotted var(--dimmer); padding-bottom: 2px; transition: all 0.15s; }
        .back-link:hover { color: var(--white); border-bottom-color: var(--white); }

        .footer { margin-top: 50px; padding-top: 20px; border-top: 1px solid var(--dimmer); font-size: 0.65rem; color: #2a2a2a; letter-spacing: 2px; display: flex; justify-content: space-between; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @media (max-width: 520px) { .container { padding: 30px 20px; } .page-title { font-size: 2.5rem; } .footer { flex-direction: column; gap: 6px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="px px-tl"></div><div class="px px-tr"></div><div class="px px-bl"></div><div class="px px-br"></div>

    <div class="status-bar">
        <span><span class="status-dot"></span>TRANSMITTING</span>
        <span>NOTES.LOG</span>
        <span>TORTOISE v0.1</span>
    </div>

    <nav class="nav">
        <a href="/">home</a>
        <a href="/blog.html" class="active">blog</a>
        <a href="/about.html">about</a>
    </nav>

    <div class="page-header">
        <span class="tortoise-icon">🐢</span>
        <div class="page-title">TORTOISE NOTES</div>
        <div class="page-sub">>> slow thoughts. posted when they're ready.</div>
    </div>

    <div id="blog-posts"><div style="text-align:center;color:var(--dim);padding:40px;letter-spacing:3px;">[ loading... ]</div></div>

    <a href="/" class="back-link">← back to tortoise</a>

    <div class="footer">
        <span>TORTOISE // notes from the slow</span>
        <span>NOTES.LOG</span>
    </div>
</div>
<script>
    const posts = [
        {
            date: "sep 22, 2025",
            title: "why slow matters",
            content: `the world moves fast. we don't have to.\n\nwhen you feel unheard, when you feel lonely, when you feel invisible — the last thing you need is something fast. fast feels cold. fast feels like you're just another notification.\n\nslow feels different. slow feels like someone is actually paying attention. like they're not in a hurry to leave.\n\nthat's why this is tortoise. because we're building something that stays.\n\n🐢\nslowly,\ndeva`
        },
        {
            date: "may 5, 2024",
            title: "what i'm building and why",
            content: `someone asked me today: "why an app for loneliness? isn't that what friends are for?"\n\nyes. and no.\n\nfriends are wonderful. but friends aren't always there at 3am. friends don't always understand the kind of quiet that feels like drowning.\n\ntortoise is for those moments. not to replace friends. but to be there when friends can't be.\n\na human who just listens. no advice. no fixing. just "i hear you. i'm here."\n\nthat's all. that's everything.`
        },
        {
            date: "feb 20, 2024",
            title: "the cherry story",
            content: `why a cherry?\n\npeople ask. they see the pixel cherry next to the tortoise and wonder.\n\ncherries are small. they're sweet. they don't try to be a whole meal. they're just a moment.\n\nwhen you're lonely, you don't need someone to fix everything. sometimes you just need a small sweetness. someone to sit with you. someone to say "i see you."\n\nthe cherry is that small sweetness.\n\n🍒\nsweetly,\ndeva`
        }
    ];

    const container = document.getElementById('blog-posts');
    container.innerHTML = posts.map((post, i) => {
        const paras = post.content.split('\n\n').map(p => p.trim() ? `<p>${p.replace(/\n/g,'<br>')}</p>` : '').join('');
        return `<div class="post"><div class="post-meta">>> ${post.date.toUpperCase()}</div><div class="post-title">${post.title}</div><div class="post-body">${paras}</div></div>${i < posts.length - 1 ? '<div class="separator">— // —</div>' : ''}`;
    }).join('');

    document.querySelector('.tortoise-icon').addEventListener('click', function() {
        this.style.transform = 'scale(1.3)';
        setTimeout(() => this.style.transform = '', 300);
        alert('🐢 "keep writing. someone is reading."');
    });
</script>
</body>
</html>
